<!doctype html>
<html lang="zh-Hant">
  <head>
    <!-- 設定網頁文字編碼，讓中文可以正常顯示。 -->
    <meta charset="UTF-8" />
    <!-- 瀏覽器分頁上的小圖示。 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- RWD 設定，讓手機與桌面都能依照裝置寬度排版。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM2.5 測站濃度分析平台</title>
  </head>
  <body>
    <!-- Vue 會透過 main.js 的 mount('#app') 掛載到這個容器。 -->
    <div id="app"></div>
    <!-- Vite 從這裡載入前端入口程式。 -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
